<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header display-flex">
        <div class="site-logo">
            <img src="./assets/logo.png" alt="site logo">
        </div>
        <div class="menu">
            <img src="./assets/menu-bar.png" alt="">
        </div>
    </div>

    <div class="banner display-flex">
        <div class="banner-text">
            <h1>Mi LED TV 4A PRO 32</h1>
            <p>Amet minim mollit non deserunt ullamco est sit aliqua dolor do amet sint. Velit officia consequat duis
                enim velit mollit. Exercitation veniam consequat sunt nostrud amet.</p>
            <h4>$1289</h4>
            <button>Buy Now</button>
        </div>
        <div class="banner-image">
            <img src="./assets/hero-tv.png" alt="hero tv">
        </div>
    </div>

    <!-- categories -->
    <div class="categories-section">
        <h1>Categories</h1>
        <div class="categories display-flex">
            <div class="category-watch display-flex">
                <div class="category-name">
                    <h1>Watch</h1>
                </div>
                <div class="category-image">
                    <img src="./assets/category-watch.png" alt="">
                </div>
            </div>
            <div class="category-bags display-flex">
                <div class="category-name">
                    <h1>Watch</h1>
                </div>
                <div class="category-image">
                    <img src="./assets/category-bag.png" alt="">
                </div>
            </div>
            <div class="category-shoes display-flex">
                <div class="category-name">
                    <h1>Watch</h1>
                </div>
                <div class="category-image">
                    <img src="./assets/category-shoe.png" alt="">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
